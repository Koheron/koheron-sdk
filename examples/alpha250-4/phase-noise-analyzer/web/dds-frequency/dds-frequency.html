<template class="template">
  <div class="crossed">
    <span>DDS Frequency (MHz)</span>
  </div>
  <table class="full-width">
    <tr>
      <td style="width: 60px">
        DUT X
      </td>
      <td style="width: 120px">
        <input type="number" value="0" min="0" step="0.000001" max="125.0" class="dds-input0">
      </td>
      <td>
        <button class="default-btn dds-set0">Set LO DUT X</button>
      </td>
    </tr>
    <tr>
      <td style="width: 60px">
        REF X
      </td>
      <td style="width: 120px">
        <input type="number" value="0" min="0" step="0.000001" max="125.0" class="dds-input1">
      </td>
      <td>
        <button class="default-btn dds-set1">Set LO REF X</button>
      </td>
    </tr>
    <tr>
      <td style="width: 60px">
        DUT Y
      </td>
      <td style="width: 120px">
        <input type="number" value="0" min="0" step="0.000001" max="125.0" class="dds-input2">
      </td>
      <td>
        <button class="default-btn dds-set2">Set LO DUT Y</button>
      </td>
    </tr>
    <tr>
      <td style="width: 60px">
        REF Y
      </td>
      <td style="width: 120px">
        <input type="number" value="0" min="0" step="0.000001" max="125.0" class="dds-input3">
      </td>
      <td>
        <button class="default-btn dds-set3">Set LO REF Y</button>
      </td>
    </tr>
  </table>
</template>
